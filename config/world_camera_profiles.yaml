schema_version: 1
default_profile: world_ultrawide_4k30_140

# Profiles describe only the simulated optics, render cadence, encoder budget,
# and explicit calibration snapshot quality. Runtime identity, RTP/control
# endpoints, Gazebo pose, and TF ownership remain per-instance launch inputs.
profiles:
  world_ultrawide_4k30_140:
    image:
      width_px: 3840
      height_px: 2160
      frame_rate_hz: 30.0
    lens:
      horizontal_fov_degrees: 140.0
      near_clip_m: 0.05
      far_clip_m: 100.0
      gaussian_noise_stddev: 0.0
    encoder:
      average_bitrate_bps: 24000000
      maximum_bitrate_bps: 36000000
      pacing_bitrate_bps: 72000000
      vbv_buffer_ms: 500
    snapshot:
      jpeg_quality: 90

  calibration_standard_720p20:
    image:
      width_px: 1280
      height_px: 720
      frame_rate_hz: 20.0
    lens:
      horizontal_fov_degrees: 80.0
      near_clip_m: 0.05
      far_clip_m: 100.0
      gaussian_noise_stddev: 0.0
    encoder:
      average_bitrate_bps: 4000000
      maximum_bitrate_bps: 6000000
      pacing_bitrate_bps: 12000000
      vbv_buffer_ms: 500
    snapshot:
      jpeg_quality: 90
