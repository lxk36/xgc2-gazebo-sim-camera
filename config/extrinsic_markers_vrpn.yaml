model_states_topic: /gazebo/model_states
bind_address: ""
port: 3883
publish_rate: 60.0
scan_interval: 0.5
stale_timeout: 1.0
velocity_filter_cutoff: 25.0
acceleration_filter_cutoff: 25.0
derivative_reset_timeout: 0.5
match_mode: exact
auto_track_known_models: false
trackers: []
auto_mapping:
  enabled: false
  include_patterns: []
manual_mapping:
  cal_marker_01: cal_marker_01
  cal_marker_02: cal_marker_02
  cal_marker_03: cal_marker_03
  cal_marker_04: cal_marker_04
  cal_marker_05: cal_marker_05
  cal_marker_06: cal_marker_06
default_body_to_tracker:
  xyz: [0.0, 0.0, 0.0]
  rpy: [0.0, 0.0, 0.0]
extrinsics: {}
robots: {}
