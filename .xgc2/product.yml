schema: xgc2.product.v1
id: xgc2-gazebo-sim-camera
name: XGC2 Gazebo Sim Camera
version: 0.1.0-10
kind: ros1-apt
summary: Independent fixed-site RGB camera, calibration targets, and RViz AR scene
  for Gazebo Classic 11.
ros:
  distro: noetic
  packages:
  - gazebo_sim_camera
apt:
  distribution: focal
  install:
  - ros-noetic-xgc2-gazebo-sim-camera
  packages:
  - ros-noetic-xgc2-gazebo-sim-camera
  package_architectures:
    ros-noetic-xgc2-gazebo-sim-camera:
    - amd64
    - arm64
  depends:
  - python3-numpy
  - python3-opencv
  - ros-noetic-gazebo-msgs
  - ros-noetic-gazebo-plugins
  - ros-noetic-gazebo-ros
  - ros-noetic-rospy
  - ros-noetic-roslaunch
  - ros-noetic-rostopic
  - ros-noetic-rviz
  - ros-noetic-sensor-msgs
  - ros-noetic-tf
  - ros-noetic-xacro
  - ros-noetic-xgc2-gazebo-sim-worlds (>= 1.1.0-14)
  recommends:
  - ros-noetic-xgc2-gazebo-sim-vrpn-bridge (>= 1.1.0-13)
usage:
  install: 'sudo apt update

    sudo apt install ros-noetic-xgc2-gazebo-sim-camera

    '
  smoke_test: 'roslaunch --files gazebo_sim_camera static_camera.launch gui:=false

    roslaunch --files gazebo_sim_camera intrinsic_calibration_world.launch gui:=false

    roslaunch --files gazebo_sim_camera extrinsic_calibration_world.launch gui:=false
    start_vrpn:=false

    '
  notes: 'This product owns only an independent fixed-site camera. It does not modify

    or depend on any FS150, Scout, UAV, or other vehicle camera model.

    '
ownership:
  paths:
  - /opt/ros/noetic/share/gazebo_sim_camera
  - /opt/ros/noetic/lib/gazebo_sim_camera
  - /usr/share/xgc2/process-definitions/gazebo-static-camera.json
release:
  requires:
  - xgc2-gazebo-sim-scenes
  - xgc2-gazebo-sim-vrpn-bridge
  dependency_policy:
    xgc2-gazebo-sim-vrpn-bridge: verify
    xgc2-gazebo-sim-scenes: verify
  repository: lxk36/xgc2-gazebo-sim-camera
  ref: main
  workflow: release.yml
  ci_workflow: ci.yml
  apt_versions:
    focal: 0.1.0-10
